# Render Blueprint - Salon Billing (combined frontend + backend)
# See docs/RENDER_DEPLOY.md for step-by-step guide

services:
  - type: web
    name: salon-billing
    runtime: node
    region: singapore

    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: node server/run-all-migrations.js && node server/server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
